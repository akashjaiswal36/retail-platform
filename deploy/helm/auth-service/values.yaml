namespace: retail-app

image:
  repository: 562887205095.dkr.ecr.ap-south-1.amazonaws.com/auth-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081


ingress:
  enabled: true
  className: alb
  host: auth-dev.cloudai.click
  certificateArn: ""   # add ACM cert later

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

replicaCount: 1

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuUtilization: 70

secrets:
  dbSecretName: retail/auth/dev/db
  appSecretName: retail/auth/dev/app