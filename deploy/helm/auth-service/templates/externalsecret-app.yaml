apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-app-secret
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: auth-app-secret
    creationPolicy: Owner

  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.secrets.appSecretName }}
        property: JWT_SECRET

    - secretKey: JWT_EXPIRATION
      remoteRef:
        key: {{ .Values.secrets.appSecretName }}
        property: JWT_EXPIRATION