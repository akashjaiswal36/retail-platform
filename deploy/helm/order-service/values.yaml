replicaCount: 1

image:
  repository: 562887205095.dkr.ecr.ap-south-1.amazonaws.com/order-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: order-service

service:
  type: ClusterIP
  port: 8082
  targetPort: 8082

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

app:
  profile: dev

ingress:
  enabled: false