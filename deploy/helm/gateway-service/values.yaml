replicaCount: 1

image:
  repository: 562887205095.dkr.ecr.ap-south-1.amazonaws.com/gateway-service
  pullPolicy: IfNotPresent
  tag: v2

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 60
  periodSeconds: 20

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 30
  periodSeconds: 10