apiVersion: v1
kind: Service
metadata:
  name: {{ include "gateway-service.fullname" . }}
  labels:
    app: gateway-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "gateway-service.name" . }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 8080