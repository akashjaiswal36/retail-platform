version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: retail-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: retail_auth_db
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: