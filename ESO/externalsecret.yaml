apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: retail-db-secret
  namespace: retail-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore

  target:
    name: retail-db-secret
    creationPolicy: Owner

  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: retail/auth/dev/db
        property: username

    - secretKey: DB_PASSWORD
      remoteRef:
        key: retail/auth/dev/db
        property: password

    - secretKey: DB_HOST
      remoteRef:
        key: retail/auth/dev/db
        property: host

    - secretKey: DB_PORT
      remoteRef:
        key: retail/auth/dev/db
        property: port

    - secretKey: DB_NAME
      remoteRef:
        key: retail/auth/dev/db
        property: dbname