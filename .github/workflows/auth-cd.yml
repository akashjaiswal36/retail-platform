name: Auth Service CD

on:
  workflow_run:
    workflows: ["Auth Service CI"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: eks-demo-cluster
      RELEASE_NAME: auth-service
      NAMESPACE: retail-app

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::562887205095:role/GitHubActionsECRPushRole
          aws-region: ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name eks-demo-cluster

      - name: Deploy to EKS
        run: |
          helm upgrade --install auth-service ./deploy/helm/auth-service \
            --namespace retail-app \
            --set image.tag=${{ github.event.workflow_run.head_sha }}