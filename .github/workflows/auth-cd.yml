name: Auth Service CD

on:
  workflow_run:
    workflows:
      - Auth Service CI
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'feature/auth-service'

    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: eks-demo-cluster
      RELEASE_NAME: auth-service
      NAMESPACE: retail-app

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::562887205095:role/GitHubActionsECRPushRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME


      - name: Deploy to EKS
        run: |
          helm upgrade --install $RELEASE_NAME ./deploy/helm/auth-service \
            --namespace $NAMESPACE \
            --set image.tag=${{ github.event.workflow_run.head_sha }}
