name: Gateway Service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'services/gateway-service/**'
      - 'deploy/helm/gateway-service/**'
      - '.github/workflows/gateway-ci.yml'
      - '.github/workflows/reusable-java-build.yml'

permissions:
  id-token: write
  contents: read


jobs:
  build-test-scan:
    uses: ./.github/workflows/reusable-java-build.yml
    with:
      service-path: services/gateway-service
      ecr-repository: gateway-service
    secrets: inherit

  deploy:
    needs: build-test-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: eks-demo-cluster
      RELEASE_NAME: gateway-service
      NAMESPACE: retail-app

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::562887205095:role/GitHubActionsECRPushRole
          aws-region: ap-south-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ap-south-1 \
            --name eks-demo-cluster

      - name: Who am I?
        run: |
          aws sts get-caller-identity
          
      - name: Deploy to EKS
        run: |
          helm upgrade --install gateway-service ./deploy/helm/gateway-service \
            --namespace retail-app \
            --set image.tag=${{ github.sha }}