spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/retail_order_db?options=-c%20TimeZone=Asia/Kolkata}
    username: ${DB_USERNAME:order_admin}
    password: ${DB_PASSWORD:order_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration